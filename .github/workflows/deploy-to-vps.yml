name: Deploy to VPS

on:
  push:
    branches:
      - main      # Deploy when pushing to main branch
      - master    # Or master branch
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (Optional - for caching)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate version tag
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "VERSION=${GITHUB_REF_NAME}-${SHORT_SHA}-$(date +%s)" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f Dockerfile \
            -t postiz-app:${{ steps.version.outputs.VERSION }} \
            -t postiz-app:latest \
            --build-arg NEXT_PUBLIC_VERSION=${{ steps.version.outputs.SHORT_SHA }} \
            --load \
            .

      - name: Save Docker image to tar
        run: |
          docker save postiz-app:latest | gzip > postiz-app-latest.tar.gz
          ls -lh postiz-app-latest.tar.gz

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "postiz-app-latest.tar.gz,docker-compose.prod.yaml,dynamicconfig"
          target: "/opt/postiz"
          strip_components: 0

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/postiz
            
            # Load the new image
            echo "Loading new Docker image..."
            docker load -i postiz-app-latest.tar.gz
            rm postiz-app-latest.tar.gz
            
            # Check if .env file exists
            if [ ! -f .env ]; then
              echo "ERROR: .env file not found in /opt/postiz"
              echo "Please create .env file with required configuration"
              exit 1
            fi
            
            # Pull latest images for dependencies
            echo "Pulling dependency images..."
            docker compose -f docker-compose.prod.yaml pull postiz-postgres postiz-redis temporal-elasticsearch temporal-postgresql temporal temporal-ui
            
            # Stop and remove old containers
            echo "Stopping old containers..."
            docker compose -f docker-compose.prod.yaml down
            
            # Start new containers
            echo "Starting new containers..."
            docker compose -f docker-compose.prod.yaml up -d
            
            # Wait for services to be healthy
            echo "Waiting for services to be healthy..."
            sleep 10
            
            # Check container status
            echo "Container status:"
            docker compose -f docker-compose.prod.yaml ps
            
            # Show logs from postiz app
            echo "Recent logs from postiz-app:"
            docker logs postiz-app --tail 50
            
            # Cleanup old images
            echo "Cleaning up old Docker images..."
            docker image prune -f
            
            echo "Deployment completed successfully!"

      - name: Health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Wait a bit for the app to fully start
            sleep 30
            
            # Check if the app is responding
            HEALTH_CHECK=$(docker exec postiz-app curl -f http://localhost:5000/api/health || echo "FAILED")
            
            if [ "$HEALTH_CHECK" = "FAILED" ]; then
              echo "Health check failed! Showing logs..."
              docker logs postiz-app --tail 100
              exit 1
            else
              echo "Health check passed! Application is running."
            fi

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi
