# Optimized nginx configuration for low-memory systems
# Reduces worker processes, connections, and buffer sizes

user                            www;
worker_processes                1; # Limited to 1 for low-memory systems
worker_rlimit_nofile            1024;
worker_priority                 0;

events {
    worker_connections          512; # Reduced from 1024
    multi_accept                on;
    use                         epoll;
}

http {
    include                     /etc/nginx/mime.types;
    default_type                application/octet-stream;
    
    # Optimized for low memory
    sendfile                    on;
    tcp_nopush                  on;
    tcp_nodelay                 on;
    keepalive_timeout           30; # Reduced from default 65
    keepalive_requests          50;  # Reduced from default 100
    
    # Disable access logs to save I/O and memory
    access_log                  off;
    error_log                   /var/log/nginx/error.log warn;
    
    # Buffer optimizations for low memory
    client_body_buffer_size     128k;  # Reduced from default
    client_max_body_size        512M;  # Reduced from 2G
    client_header_buffer_size   1k;
    large_client_header_buffers 4 8k;
    
    # Output buffer settings
    output_buffers              2 32k;
    postpone_output             1460;
    
    # Reduce proxy buffers
    proxy_buffering             on;
    proxy_buffer_size           4k;
    proxy_buffers               8 4k;
    proxy_busy_buffers_size     8k;
    proxy_temp_file_write_size  8k;
    
    # Connection timeouts
    proxy_connect_timeout       30;
    proxy_send_timeout          30;
    proxy_read_timeout          60;
    send_timeout                30;
    
    # Disable server tokens
    server_tokens               off;
    
    server {
        listen                  5000;
        server_name             _;
        
        # Gzip compression (saves bandwidth, minimal CPU cost)
        gzip                    on;
        gzip_vary               on;
        gzip_min_length         1024;
        gzip_comp_level         4; # Reduced from 6 to save CPU
        gzip_types              text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
        gzip_buffers            16 8k;
        
        # API backend
        location /api/ {
            proxy_pass          http://localhost:3000/;
            proxy_http_version  1.1;
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Reload $http_reload;
            proxy_set_header    Onboarding $http_onboarding;
            proxy_set_header    Activate $http_activate;
            proxy_set_header    Auth $http_auth;
            proxy_set_header    Showorg $http_showorg;
            proxy_set_header    Impersonate $http_impersonate;
            proxy_set_header    Accept-Language $http_accept_language;
            
            # No buffering for API responses
            proxy_buffering     off;
        }
        
        # Static uploads
        location /uploads/ {
            alias               /uploads/;
            expires             30d;
            add_header          Cache-Control "public, immutable";
        }
        
        # Frontend
        location / {
            proxy_pass          http://localhost:4200/;
            proxy_http_version  1.1;
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Reload $http_reload;
            proxy_set_header    Onboarding $http_onboarding;
            proxy_set_header    Activate $http_activate;
            proxy_set_header    Auth $http_auth;
            proxy_set_header    Showorg $http_showorg;
            proxy_set_header    Impersonate $http_impersonate;
            proxy_set_header    Accept-Language $http_accept_language;
            proxy_set_header    i18next $http_i18next;
            
            # Enable buffering for frontend
            proxy_buffering     on;
        }
    }
}
