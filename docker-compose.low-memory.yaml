# Low-Memory Optimized Docker Compose for Postiz
# This configuration uses minimal resources (suitable for 2-4GB RAM systems)
# 
# Memory optimizations:
# - Single PostgreSQL for both app and Temporal
# - Removed Elasticsearch (Temporal uses PostgreSQL only)
# - Removed Temporal UI and admin tools
# - Removed Spotlight monitoring
# - Added strict memory limits
# - Optimized PostgreSQL and Redis settings

services:
  postiz:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_VERSION: ${VERSION:-latest}
    container_name: postiz
    restart: always
    environment:
      # === Required Settings
      MAIN_URL: ${MAIN_URL:-http://localhost:4007}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4007}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:4007/api}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-this-in-production-make-it-very-long-and-random}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postiz-user:postiz-password@postiz-postgres:5432/postiz-db}
      REDIS_URL: ${REDIS_URL:-redis://postiz-redis:6379}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://localhost:3000}
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-temporal:7233}
      IS_GENERAL: ${IS_GENERAL:-true}
      DISABLE_REGISTRATION: ${DISABLE_REGISTRATION:-false}

      # === Storage Settings
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      UPLOAD_DIRECTORY: ${UPLOAD_DIRECTORY:-/uploads}
      NEXT_PUBLIC_UPLOAD_DIRECTORY: ${NEXT_PUBLIC_UPLOAD_DIRECTORY:-/uploads}

      # === Social Media API Settings (Optional)
      X_API_KEY: ${X_API_KEY:-}
      X_API_SECRET: ${X_API_SECRET:-}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      THREADS_APP_ID: ${THREADS_APP_ID:-}
      THREADS_APP_SECRET: ${THREADS_APP_SECRET:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID:-}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET:-}
      TIKTOK_CLIENT_ID: ${TIKTOK_CLIENT_ID:-}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET:-}
      PINTEREST_CLIENT_ID: ${PINTEREST_CLIENT_ID:-}
      PINTEREST_CLIENT_SECRET: ${PINTEREST_CLIENT_SECRET:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      SLACK_ID: ${SLACK_ID:-}
      SLACK_SECRET: ${SLACK_SECRET:-}
      MASTODON_URL: ${MASTODON_URL:-https://mastodon.social}

      # === Payment / Stripe Settings
      FEE_AMOUNT: ${FEE_AMOUNT:-0.05}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_SIGNING_KEY: ${STRIPE_SIGNING_KEY:-}
      STRIPE_SIGNING_KEY_CONNECT: ${STRIPE_SIGNING_KEY_CONNECT:-}

      # === Misc Settings
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      API_LIMIT: ${API_LIMIT:-30}
      NX_ADD_PLUGINS: false

      # Memory optimization: Reduce Node.js memory
      NODE_OPTIONS: "--max-old-space-size=512"

    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    ports:
      - "4007:5000"
    networks:
      - postiz-network
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
    # Memory limit for main app
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 512M

  # Single PostgreSQL instance for both Postiz and Temporal
  postiz-postgres:
    image: postgres:17-alpine
    container_name: postiz-postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: postiz-password
      POSTGRES_USER: postiz-user
      POSTGRES_DB: postiz-db
      # Optimize PostgreSQL for low memory
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=4MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=4MB
      -c min_wal_size=1GB
      -c max_wal_size=2GB
      -c max_connections=100
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    networks:
      - postiz-network
      - temporal-network
    healthcheck:
      test: pg_isready -U postiz-user -d postiz-db
      interval: 10s
      timeout: 3s
      retries: 3
    # Memory limit for PostgreSQL
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Redis with memory optimization
  postiz-redis:
    image: redis:7.2-alpine
    container_name: postiz-redis
    restart: always
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --activedefrag yes
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - postiz-redis-data:/data
    networks:
      - postiz-network
    # Memory limit for Redis
    deploy:
      resources:
        limits:
          memory: 150M
        reservations:
          memory: 100M

  # Temporal with minimal configuration (PostgreSQL only, no Elasticsearch)
  temporal:
    container_name: temporal
    image: temporalio/auto-setup:1.28.1
    ports:
      - '7233:7233'
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postiz-user
      - POSTGRES_PWD=postiz-password
      - POSTGRES_SEEDS=postiz-postgres
      - POSTGRES_DB=postiz-db
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=false
      - TEMPORAL_NAMESPACE=default
      # Optimize Temporal memory
      - TEMPORAL_BROADCAST_ADDRESS=0.0.0.0
    networks:
      - temporal-network
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
    depends_on:
      postiz-postgres:
        condition: service_healthy
    # Memory limit for Temporal
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  postgres-volume:
    driver: local
  postiz-redis-data:
    driver: local
  postiz-config:
    driver: local
  postiz-uploads:
    driver: local

networks:
  postiz-network:
    driver: bridge
  temporal-network:
    driver: bridge
